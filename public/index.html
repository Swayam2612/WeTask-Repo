<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WeTask</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Auth Screen -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-bg">
    <div class="auth-blob blob-1"></div>
    <div class="auth-blob blob-2"></div>
    <div class="auth-blob blob-3"></div>
  </div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="12" height="12" rx="3" fill="white" opacity=".9"/>
          <rect x="16" width="12" height="12" rx="3" fill="white" opacity=".7"/>
          <rect x="8" y="16" width="12" height="12" rx="3" fill="white" opacity=".8"/>
        </svg>
      </div>
      <span>WeTask</span>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Create Account</button>
    </div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      <div id="login-error" class="auth-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <form id="register-form" class="auth-form hidden">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@company.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min. 6 characters" required />
      </div>
      <div class="form-group">
        <label>Account Type</label>
        <select id="reg-role" required>
          <option value="member">User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div id="register-error" class="auth-error hidden"></div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
      <p class="auth-note">Choose User for regular access or Admin for workspace management</p>
    </form>
  </div>
</div>

<!-- App Shell -->
<div id="app" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon sm">
        <svg width="18" height="18" viewBox="0 0 28 28" fill="none">
          <rect width="12" height="12" rx="3" fill="white" opacity=".9"/>
          <rect x="16" width="12" height="12" rx="3" fill="white" opacity=".7"/>
          <rect x="8" y="16" width="12" height="12" rx="3" fill="white" opacity=".8"/>
        </svg>
      </div>
      <span class="logo-text">WeTask</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <a href="#dashboard" class="nav-item" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="#projects" class="nav-item" data-page="projects">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 7a2 2 0 012-2h5l2 2h9a2 2 0 012 2v9a2 2 0 01-2 2H4a2 2 0 01-2-2z"/></svg>
        <span>Projects</span>
      </a>
      <a href="#tasks" class="nav-item" data-page="tasks">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        <span>Tasks</span>
      </a>
      <a href="#teams" class="nav-item" data-page="teams">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Teams</span>
      </a>
      <a href="#calendar" class="nav-item" data-page="calendar">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendar</span>
      </a>
      <div class="nav-section-label mt">Workspace</div>
      <a href="#notifications" class="nav-item" data-page="notifications">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
        <span>Notifications</span>
        <span id="sidebar-notif-badge" class="nav-badge hidden">0</span>
      </a>
      <a href="#activity" class="nav-item" data-page="activity">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Activity</span>
      </a>
      <a href="#profile" class="nav-item" data-page="profile">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
      </a>
      <a href="#users" class="nav-item admin-only" data-page="users">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><path d="M20 8l2 2-6 6"/><path d="M22 10l-6 6"/></svg>
        <span>Users</span>
        <span class="admin-badge">Admin</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user">
        <div class="avatar sm" id="sidebar-avatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sidebar-name">Loading...</div>
          <div class="sidebar-user-role" id="sidebar-role">member</div>
        </div>
      </div>
      <button class="btn-icon" id="logout-btn" title="Logout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-wrapper">
    <header class="topbar">
      <button class="btn-icon sidebar-toggle" id="sidebar-toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="global-search" placeholder="Search tasks, projects, teams..." class="search-input" />
        <div id="search-results" class="search-dropdown hidden"></div>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon notif-btn" id="notif-btn" title="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span id="notif-count" class="notif-dot hidden">0</span>
        </button>
        <div class="topbar-avatar" id="topbar-avatar" role="button" tabindex="0" title="Profile">?</div>
      </div>
    </header>

    <main id="page-content" class="page-content"></main>
  </div>
</div>

<!-- Global Modal -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div id="modal-container" class="modal-container">
    <div class="modal-header">
      <h3 id="modal-title">Modal</h3>
      <button class="modal-close" id="modal-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="modal-body" class="modal-body"></div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container" class="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/js/app.js"></script>
<script src="/js/pages.js"></script>
</body>
</html>
